<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4332;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Mountain + Leaf icon -->
  <g transform="translate(8, 8)">
    <!-- Mountain silhouette -->
    <polygon points="32,4 50,52 14,52" fill="url(#mountainGrad)" />
    <polygon points="22,24 34,52 10,52" fill="#264653" opacity="0.5" />
    <!-- Leaf accent emerging from peak -->
    <path d="M32,4 Q44,12 38,24 Q34,18 32,4 Z" fill="#52B788" />
    <!-- Snow cap -->
    <polygon points="32,4 37,14 27,14" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- Text: GreenSport -->
  <text x="72" y="38" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#1B4332">
    Green<tspan fill="#2D6A4F">Sport</tspan>
  </text>

  <!-- Text: Graubünden -->
  <text x="72" y="58" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#264653" letter-spacing="0.1em">
    GRAUBÜNDEN
  </text>

  <!-- Accent underline -->
  <rect x="72" y="63" width="60" height="2" rx="1" fill="#E9C46A" />
</svg>
