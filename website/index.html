<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenSport Graubünden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #264653;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #264653;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    header span {
      color: #E9C46A;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #f0faf4 0%, #e8f5ee 100%);
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 3rem;
      max-width: 540px;
      text-align: center;
    }
    .card h2 {
      font-size: 1.75rem;
      color: #2D6A4F;
      margin-bottom: 1rem;
    }
    .card p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: #2D6A4F;
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    footer {
      background: #264653;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Green</span>Sport Graubünden</h1>
  </header>
  <main>
    <div class="card">
      <h2>Website im Aufbau</h2>
      <p>Die Plattform für den ökologischen Fussabdruck alpiner Sportveranstaltungen wird derzeit entwickelt. Astro&nbsp;5.x mit Tailwind&nbsp;CSS folgt in Kürze.</p>
      <div class="badge">Placeholder — nginx:alpine</div>
    </div>
  </main>
  <footer>
    &copy; 2026 GreenSport Graubünden — Fachhochschule Graubünden, Modul WINF1
  </footer>
</body>
</html>
